<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">Syndrome-guided single-bit correction workflow</title>
  <desc id="desc">A seven-bit received word enters parity checks. A nonzero three-bit syndrome points to a candidate bit position, which is flipped before the checks are repeated. A warning says this inference assumes the code's one-error model.</desc>
  <defs><pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#d9cfba" stroke-width="1"/></pattern><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0l9 3-9 3z" fill="#17233c"/></marker></defs>
  <rect width="1000" height="600" fill="#f3ead7"/><rect width="1000" height="600" fill="url(#grid)" opacity=".72"/>
  <text x="55" y="65" font-family="sans-serif" font-size="30" font-weight="700" fill="#17233c">A syndrome is evidence about an error pattern</text>
  <g font-family="monospace" font-size="26" font-weight="700"><text x="80" y="150" fill="#465068">received</text>
    <g transform="translate(65 175)"><rect width="420" height="72" rx="12" fill="#fffaf0" stroke="#17233c" stroke-width="3"/><text x="35" y="46" fill="#17233c">0</text><text x="95" y="46" fill="#17233c">1</text><text x="155" y="46" fill="#17233c">1</text><rect x="190" y="7" width="50" height="58" rx="8" fill="#f6caca"/><text x="215" y="46" text-anchor="middle" fill="#d95d5d">1</text><text x="275" y="46" fill="#17233c">0</text><text x="335" y="46" fill="#17233c">1</text><text x="395" y="46" fill="#17233c">1</text></g>
  </g>
  <path d="M500 211H610" stroke="#17233c" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="630" y="145" width="300" height="132" rx="18" fill="#17233c"/><text x="780" y="188" text-anchor="middle" font-family="sans-serif" font-size="23" font-weight="700" fill="#f3ead7">PARITY CHECKS</text><text x="780" y="235" text-anchor="middle" font-family="monospace" font-size="31" font-weight="700" fill="#e8a23a">syndrome = 100</text>
  <path d="M780 280V350" stroke="#17233c" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="605" y="365" width="350" height="105" rx="18" fill="#dceee9" stroke="#2c8c87" stroke-width="4"/><text x="780" y="405" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#17233c">candidate position 4</text><text x="780" y="440" text-anchor="middle" font-family="sans-serif" font-size="19" fill="#17233c">flip once, then recheck</text>
  <path d="M605 418H455" stroke="#17233c" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="75" y="365" width="360" height="105" rx="18" fill="#fffaf0" stroke="#e8a23a" stroke-width="4"/><text x="255" y="406" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#17233c">corrected candidate</text><text x="255" y="442" text-anchor="middle" font-family="monospace" font-size="26" fill="#17233c">0110011</text>
  <rect x="130" y="520" width="740" height="48" rx="24" fill="#d95d5d"/><text x="500" y="551" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#fff">Valid only within the decoder's assumed error model; multiple errors may mislead it</text>
</svg>
