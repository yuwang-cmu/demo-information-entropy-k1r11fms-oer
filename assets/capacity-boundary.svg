<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">Capacity as an asymptotic boundary on reliable communication rate</title>
  <desc id="desc">A horizontal rate axis is divided at C. Below capacity, sufficiently long well-designed codes can make error probability arbitrarily small under the model. Above capacity, error cannot be driven arbitrarily close to zero. Finite blocks still have nonzero tradeoffs.</desc>
  <defs><pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#d9cfba" stroke-width="1"/></pattern></defs>
  <rect width="1000" height="600" fill="#f3ead7"/><rect width="1000" height="600" fill="url(#grid)" opacity=".72"/>
  <text x="55" y="65" font-family="sans-serif" font-size="30" font-weight="700" fill="#17233c">Capacity separates two asymptotic regimes</text>
  <rect x="70" y="145" width="540" height="285" rx="22" fill="#dceee9" stroke="#2c8c87" stroke-width="4"/>
  <rect x="610" y="145" width="320" height="285" rx="22" fill="#f7dddd" stroke="#d95d5d" stroke-width="4"/>
  <line x1="610" y1="120" x2="610" y2="475" stroke="#17233c" stroke-width="6"/>
  <g font-family="sans-serif" fill="#17233c"><text x="340" y="205" text-anchor="middle" font-size="28" font-weight="700">RATE R &lt; C</text><text x="340" y="250" text-anchor="middle" font-size="21">codes exist with error → 0</text><text x="340" y="285" text-anchor="middle" font-size="21">as block length grows</text><text x="770" y="205" text-anchor="middle" font-size="28" font-weight="700">RATE R &gt; C</text><text x="770" y="250" text-anchor="middle" font-size="21">arbitrarily reliable</text><text x="770" y="285" text-anchor="middle" font-size="21">communication is impossible</text><text x="610" y="108" text-anchor="middle" font-size="26" font-weight="700">C</text></g>
  <path d="M95 470H915" stroke="#17233c" stroke-width="4"/><path d="m905 458 16 12-16 12" fill="none" stroke="#17233c" stroke-width="4"/>
  <text x="500" y="505" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#17233c">communication rate</text>
  <rect x="140" y="530" width="720" height="46" rx="23" fill="#17233c"/><text x="500" y="559" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#f3ead7">Not a promise of zero errors at finite block length, latency, or complexity</text>
</svg>
