<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">A noisy binary channel as a conditional probability rule</title>
  <desc id="desc">Input zero and one each branch to output zero and one. Thick teal paths retain the bit with probability one minus p; thin coral paths flip it with probability p.</desc>
  <defs><pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#d9cfba" stroke-width="1"/></pattern><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0l9 3-9 3z" fill="#17233c"/></marker></defs>
  <rect width="1000" height="600" fill="#f3ead7"/><rect width="1000" height="600" fill="url(#grid)" opacity=".72"/>
  <text x="55" y="65" font-family="sans-serif" font-size="30" font-weight="700" fill="#17233c">The channel is a probability model—not a villain</text>
  <text x="55" y="100" font-family="sans-serif" font-size="18" fill="#465068">Binary symmetric channel: each transmitted bit flips independently with probability p</text>
  <g font-family="sans-serif" font-weight="700">
    <text x="110" y="145" font-size="18" fill="#465068">INPUT X</text><text x="805" y="145" font-size="18" fill="#465068">OUTPUT Y</text>
    <circle cx="165" cy="240" r="58" fill="#fffaf0" stroke="#17233c" stroke-width="4"/><text x="165" y="257" text-anchor="middle" font-size="48" fill="#17233c">0</text>
    <circle cx="165" cy="440" r="58" fill="#fffaf0" stroke="#17233c" stroke-width="4"/><text x="165" y="457" text-anchor="middle" font-size="48" fill="#17233c">1</text>
    <circle cx="835" cy="240" r="58" fill="#fffaf0" stroke="#17233c" stroke-width="4"/><text x="835" y="257" text-anchor="middle" font-size="48" fill="#17233c">0</text>
    <circle cx="835" cy="440" r="58" fill="#fffaf0" stroke="#17233c" stroke-width="4"/><text x="835" y="457" text-anchor="middle" font-size="48" fill="#17233c">1</text>
  </g>
  <path d="M225 240H765" stroke="#2c8c87" stroke-width="14" marker-end="url(#arrow)"/><path d="M225 440H765" stroke="#2c8c87" stroke-width="14" marker-end="url(#arrow)"/>
  <path d="M220 270C430 390 570 390 780 270" fill="none" stroke="#d95d5d" stroke-width="6" stroke-dasharray="15 10" marker-end="url(#arrow)"/>
  <path d="M220 410C430 290 570 290 780 410" fill="none" stroke="#d95d5d" stroke-width="6" stroke-dasharray="15 10" marker-end="url(#arrow)"/>
  <g font-family="sans-serif" font-size="22" font-weight="700"><text x="500" y="215" text-anchor="middle" fill="#2c8c87">1 − p</text><text x="500" y="470" text-anchor="middle" fill="#2c8c87">1 − p</text><text x="500" y="315" text-anchor="middle" fill="#d95d5d">p</text><text x="500" y="385" text-anchor="middle" fill="#d95d5d">p</text></g>
  <rect x="310" y="520" width="380" height="48" rx="24" fill="#17233c"/><text x="500" y="552" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#f3ead7">P(Y|X) describes uncertainty after transmission</text>
</svg>
